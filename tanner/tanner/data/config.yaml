DATA:
  db_config: /opt/tanner/db/db_config.json
  dorks: /opt/tanner/data/dorks.pickle
  user_dorks: /opt/tanner/data/user_dorks.pickle
  crawler_stats: /opt/tanner/data/crawler_user_agents.txt
  geo_db: /opt/tanner/db/GeoLite2-City.mmdb
  tornado: /opt/tanner/data/tornado.py
  mako: /opt/tanner/data/mako.py

TANNER:
  host: 0.0.0.0
  port: 8090

WEB: 
  host: 0.0.0.0
  port: 8091

API: 
  host: 0.0.0.0
  port: 8092
  auth: False
  auth_signature: tanner_api_auth

PHPOX: 
  host: 0.0.0.0
  port: 8088

REDIS: 
  host: localhost
  port: 6379
  poolsize: 80 
  timeout: 1


GENERATOR:
  backend: agentic
  max_review_loops: 1
  max_bundle_artifacts: 5
  max_bundle_bytes: 262144
  checkpoint_path: /tmp/tanner-agentic-checkpoints.sqlite
  enable_live_research: False
  max_tool_response_chars: 4000
  max_command_output_chars: 4000
  command_timeout: 5
  role_defaults:
    provider: openai
    model: gpt-4.1-mini
    temperature: 0.2
    max_tokens: 900
    timeout: 120
    max_retries: 2
  roles:
    expert:
      temperature: 0.1
      max_tokens: 900
    design:
      temperature: 0.2
      max_tokens: 900
    coder:
      temperature: 0.35
      max_tokens: 1000
    review:
      temperature: 0.05
      max_tokens: 700

EMULATORS:
  root_dir: /opt/tanner

EMULATOR_ENABLED: 
  sqli: False
  rfi: True
  lfi: True 
  xss: True
  cmd_exec: True
  php_code_injection: True 
  php_object_injection: True
  crlf: True
  xxe_injection: True
  template_injection: True

SQLI: 
  type: SQLITE
  db_name: tanner_db
  host: 127.0.0.1
  user: root
  password: user_pass

XXE_INJECTION: 
  OUT_OF_BAND: False

RFI: 
  allow_insecure: False

DOCKER: 
  host_image: busybox:latest

LOGGER: 
  log_debug: /opt/tanner/tanner.log
  log_err: /opt/tanner/tanner.err

MONGO:
  enabled: False
  URI: mongodb://localhost

HPFEEDS: 
  enabled: False
  HOST: localhost
  PORT: 10000
  IDENT: ''
  SECRET: ''
  CHANNEL: tanner.events

LOCALLOG: 
  enabled: False
  PATH: /tmp/tanner_report.json

CLEANLOG: 
  enabled: False

REMOTE_DOCKERFILE: 
  GITHUB: "https://raw.githubusercontent.com/mushorg/tanner/master/docker/tanner/template_injection/Dockerfile"

SESSIONS: 
  delete_timeout: 300
